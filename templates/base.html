<!DOCTYPE html>
<html>

    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1"> <!-- for proper responsive behavior in mobile devices. -->
        <title>Kai's Blog</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
        <link rel="icon" href="{{ url_for('static', filename='icon.jpg') }}">
    </head>

    <body> 

    <img class="img-fluid" 
    style="position: absolute; z-index: -1; width:100%; -webkit-mask-image: linear-gradient(to bottom, black, transparent); mask-image: linear-gradient(to bottom, black, transparent);"
    src="{{ url_for('static', filename='sunlightinforest.jpg') }}"/>
    
    <div class="container"  style="max-width:900px;">

        <nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="light">
        <div class="container-fluid bg-light p-2 text-dark bg-opacity-75 rounded">
            <span class="navbar-brand mb-0 h1">Kai's Blog</span>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <!-- g is automatically available in templates -->
                    {% if g.user %}
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="">{{ g.user['username'] }}</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="{{ url_for('auth.logout') }}">Log Out</a>
                    </li>
                    {% else %}
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="{{ url_for('auth.register') }}">Register</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="{{ url_for('auth.login') }}">Log In</a>
                    </li>
                    {% endif %}
                </ul>
            </div>
        </div>
        </nav>
        
        <div class="container d-flex justify-content-between align-items-center" style="width: 100%; max-width: 45rem;">
            {% block header %}{% endblock %}
        </div>

        {% for message in get_flashed_messages() %}
        <div class="container" style="max-width: 25rem;">
            <div class="alert alert-warning" role="alert">{{ message }}</div>
        </div>
        {% endfor %}

        {% block content %}{% endblock %}

    </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
    </body>

</html>
