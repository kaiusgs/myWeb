{% extends 'base.html' %}

{% block header %}
    <div class="container d-flex justify-content-between align-items-center" style="width: 100%; max-width: 45rem;">
        <h1>Log In</h1>
    </div>
{% endblock %}

{% block content %}
    <div class="container" style="max-width: 25rem;">
        <form method="post">
            <div class="mb-3">
                <label class="form-label" for="username">Username</label>
                <input type="text" class="form-control" name="username" id="username" required>
            </div>
            <div class="mb-3">
                <label class="form-label" for="password">Password</label>
                <input type="password" class="form-control" name="password" id="password" required>
            </div>
            <div class="mb-3">
                <button type="submit" class="btn btn-sm btn-success opacity-50">Log In</button>
            </div>
        </form>
    </div>
{% endblock %}
